# Curriculum Template
# Copy this file and customize for your learning content

curriculum:
  id: your-curriculum-id           # Unique identifier (no spaces, lowercase)
  title: "Your Curriculum Title"
  description: "What this curriculum teaches"
  
  # Source material
  source:
    type: book                      # book | course | docs | video-series | custom
    url: "https://..."             # Main resource URL
    pdf: "https://..."             # Optional: PDF download link
    repo: "https://github.com/..." # Optional: GitHub repo
  
  # Metadata
  difficulty: intermediate          # beginner | intermediate | advanced
  estimated_hours: 40              # Total estimated study time
  
  # Learning tracks (can have multiple)
  tracks:
    - id: foundations
      title: "Part 1: Foundations"
      description: "Core concepts you need first"
      
      chapters:
        - id: ch1
          title: "Chapter 1: Introduction"
          
          objectives:              # What you'll learn
            - "Understand X"
            - "Be able to Y"
            - "Know when to Z"
          
          resources:               # Learning materials
            - type: reading
              ref: "Chapter 1"
              pages: "1-25"
            - type: video
              url: "https://..."
              duration: "15min"
          
          projects:                # Hands-on practice
            - "Build a simple X"
            - "Write a summary of Y"
          
          prereqs: []              # Required chapter IDs (empty = no prereqs)
          
          estimated_hours: 2
        
        - id: ch2
          title: "Chapter 2: Core Concepts"
          objectives:
            - "..."
          resources:
            - type: reading
              ref: "Chapter 2"
          prereqs: [ch1]           # Requires chapter 1
          estimated_hours: 3
    
    - id: advanced
      title: "Part 2: Advanced Topics"
      description: "Deeper dives after you have foundations"
      
      chapters:
        - id: ch5
          title: "Chapter 5: Advanced Topic"
          prereqs: [ch1, ch2]      # Multiple prereqs
          # ...
  
  # Milestones (celebrations!)
  milestones:
    - after: [ch1, ch2]
      title: "Foundations Complete! 🎉"
      message: "You now understand the basics. Great work!"
    
    - after: [ch5]
      title: "Advanced Track Done! 🚀"
      message: "You've mastered the advanced concepts!"
  
  # Final achievement
  completion:
    title: "Curriculum Complete! 🏆"
    message: "You've finished the entire curriculum. Time to apply what you've learned!"
